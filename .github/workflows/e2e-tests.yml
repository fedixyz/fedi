name: 'End-to-end tests'

on:
    workflow_dispatch:
        inputs:
            platforms:
                description: 'Which platforms to test'
                type: choice
                options:
                    - all
                    - android
                    - ios
                default: all
            tests:
                description: 'Which tests to run'
                type: choice
                options:
                    - all
                    - onboarding
                    - joinLeaveFederations
                default: all
            skip_bridge_build:
                description: 'Skip bridge builds (use cached artifacts from previous run)'
                type: boolean
                default: false
            fail_fast:
                description: 'Stop on first test failure instead of running all'
                type: boolean
                default: false
            clean_ui_files:
                description: 'Run ./scripts/ui/clean-ui.sh before building'
                type: boolean
                default: false
            debug_mode:
                description: 'Dump every task log in-line at the end of the run (collapsible groups)'
                type: boolean
                default: false
    schedule: # runs every day at 2 UTC
        - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
    android-e2e:
        name: 'Android e2e tests'
        if: ${{ (inputs.platforms || 'all') != 'ios' }}
        runs-on: [self-hosted, macos, arm64, macstadium]
        timeout-minutes: 120
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
            - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
              with:
                  nix_path: nixpkgs=channel:nixos-22.05
            - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
              with:
                  name: fedibtc
                  authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
              continue-on-error: true

            - name: Android e2e pipeline
              env:
                  TESTS_TO_RUN: ${{ inputs.tests || 'all' }}
                  SKIP_BRIDGE: ${{ inputs.skip_bridge_build && '1' || '' }}
                  FAIL_FAST: ${{ inputs.fail_fast && '1' || '' }}
                  CLEAN_UI_FILES: ${{ inputs.clean_ui_files && '1' || '' }}
                  DEBUG_MODE: ${{ inputs.debug_mode && '1' || '' }}
              run: nix develop -c ./scripts/ci/e2e-pipeline.sh android

            - name: Upload logs & screenshots
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              if: ${{ always() }}
              with:
                  name: android-logs
                  include-hidden-files: true
                  path: |
                      ./ui/.appium/*.log
                      ./ui/.appium/pipeline/*.log
                      ./metro.log
                      ./**/screenshots/*.png

    ios-e2e:
        name: 'iOS e2e tests'
        if: ${{ (inputs.platforms || 'all') != 'android' }}
        runs-on: [self-hosted, macos, arm64, gui]
        timeout-minutes: 120
        steps:
            - uses: actions/checkout@v4
            - uses: cachix/install-nix-action@v30
              with:
                  nix_path: nixpkgs=channel:nixos-22.05
            - uses: cachix/cachix-action@v15
              with:
                  name: fedibtc
                  authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
              continue-on-error: true

            - name: iOS e2e pipeline
              env:
                  TESTS_TO_RUN: ${{ inputs.tests || 'all' }}
                  SKIP_BRIDGE: ${{ inputs.skip_bridge_build && '1' || '' }}
                  FAIL_FAST: ${{ inputs.fail_fast && '1' || '' }}
                  CLEAN_UI_FILES: ${{ inputs.clean_ui_files && '1' || '' }}
                  DEBUG_MODE: ${{ inputs.debug_mode && '1' || '' }}
              run: nix develop .#xcode -c ./scripts/ci/e2e-pipeline.sh ios

            - name: Upload logs & screenshots
              uses: actions/upload-artifact@v4
              if: ${{ always() }}
              with:
                  name: ios-logs
                  include-hidden-files: true
                  path: |
                      ./ui/.appium/*.log
                      ./ui/.appium/pipeline/*.log
                      ./metro.log
                      ./**/screenshots/*.png
