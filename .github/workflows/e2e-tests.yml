name: 'End-to-end tests'

on:
    workflow_dispatch:
        inputs:
            platforms:
                description: 'Which platforms to test'
                type: choice
                options:
                    - all
                    - android
                    - ios
                    - web
                default: all
            tests:
                description: 'Which tests to run'
                type: choice
                options:
                    - all
                    - onboarding
                    - settings
                    - joinLeaveFederations
                    - chat
                    - communityChatJoin
                    - payments
                    - backupRestore
                    - pinProtection
                default: all
            skip_bridge_build:
                description: 'Skip bridge builds (use cached artifacts from previous run)'
                type: boolean
                default: false
            fail_fast:
                description: 'Stop on first test failure instead of running all'
                type: boolean
                default: false
            clean_ui_files:
                description: 'Run ./scripts/ui/clean-ui.sh before building'
                type: boolean
                default: false
            debug_mode:
                description: 'Verbose logging: full Appium + WebdriverIO + xcodebuild output, all selector strategies tried, every retry logged. Also dumps each task log inline at the end of the run.'
                type: boolean
                default: false
    schedule: # runs 3x a day at 04:00, 12:00, 23:00 UTC
        - cron: '0 4,12,23 * * *'

permissions:
  contents: read

jobs:
    android-e2e:
        name: 'Android e2e tests'
        if: ${{ contains(fromJSON('["all", "android"]'), inputs.platforms || 'all') }}
        runs-on: [self-hosted, macos, arm64, macstadium, gui]
        timeout-minutes: 120
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
            - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
              with:
                  nix_path: nixpkgs=channel:nixos-22.05
            - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
              with:
                  name: fedibtc
                  authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
              continue-on-error: true

            - name: Android e2e pipeline
              env:
                  TESTS_TO_RUN: ${{ inputs.tests || 'all' }}
                  SKIP_BRIDGE: ${{ inputs.skip_bridge_build && '1' || '' }}
                  FAIL_FAST: ${{ inputs.fail_fast && '1' || '' }}
                  CLEAN_UI_FILES: ${{ inputs.clean_ui_files && '1' || '' }}
                  DEBUG_MODE: ${{ inputs.debug_mode && '1' || '' }}
              run: nix develop -c ./scripts/ci/e2e-pipeline.sh android

            - name: Upload logs & screenshots
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: ${{ always() }}
              with:
                  name: android-logs
                  include-hidden-files: true
                  path: |
                      ./ui/.appium/*.log
                      ./ui/.appium/pipeline/*.log
                      ./metro.log
                      ./**/screenshots/*.png

    web-e2e:
        name: 'Web e2e tests'
        if: ${{ contains(fromJSON('["all", "web"]'), inputs.platforms || 'all') }}
        runs-on: [self-hosted, linux]
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
            - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
              with:
                  nix_path: nixpkgs=channel:nixos-22.05
            - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
              with:
                  name: fedibtc
                  authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
              continue-on-error: true

            - name: Web e2e pipeline
              run: nix develop -c ./scripts/ui/run-e2e-web.sh

            - name: Upload test results
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: ${{ always() }}
              with:
                  name: web-e2e-results
                  include-hidden-files: true
                  path: ./ui/web/test-results/
                  if-no-files-found: ignore

    ios-e2e:
        name: 'iOS e2e tests'
        if: ${{ contains(fromJSON('["all", "ios"]'), inputs.platforms || 'all') }}
        runs-on: [self-hosted, macos, arm64, macstadium, gui]
        timeout-minutes: 120
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
            - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
              with:
                  nix_path: nixpkgs=channel:nixos-22.05
            - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
              with:
                  name: fedibtc
                  authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
              continue-on-error: true

            - name: iOS e2e pipeline
              env:
                  TESTS_TO_RUN: ${{ inputs.tests || 'all' }}
                  SKIP_BRIDGE: ${{ inputs.skip_bridge_build && '1' || '' }}
                  FAIL_FAST: ${{ inputs.fail_fast && '1' || '' }}
                  CLEAN_UI_FILES: ${{ inputs.clean_ui_files && '1' || '' }}
                  DEBUG_MODE: ${{ inputs.debug_mode && '1' || '' }}
              run: nix develop .#xcode -c ./scripts/ci/e2e-pipeline.sh ios

            - name: Upload logs & screenshots
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: ${{ always() }}
              with:
                  name: ios-logs
                  include-hidden-files: true
                  path: |
                      ./ui/.appium/*.log
                      ./ui/.appium/pipeline/*.log
                      ./metro.log
                      ./**/screenshots/*.png
