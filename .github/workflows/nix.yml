name: 'Nix'

# Controls when the workflow will run
on:
    # Triggers the workflow on push or pull request events but only for the "main" branch
    push:
        branches: ['main', 'master', 'devel']
        paths-ignore:
            - 'ui/**'

        tags:
        - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

    pull_request: {}

    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

# https://stackoverflow.com/questions/66335225/how-to-cancel-previous-runs-in-the-pr-when-you-push-new-commitsupdate-the-curre
concurrency:
  # Cancel superseded PR runs, but never interrupt a publishing run: a push to
  # master or a tag updates several Docker Hub tags across three jobs, and being
  # cancelled part-way would leave tags at inconsistent revisions. Pushes are
  # serialized per ref instead. `github.event_name` is in the group so a manual
  # dispatch cannot cancel a push that is mid-publication.
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
    precheck:
        name: 'Check for non-UI file changes'
        runs-on: [self-hosted, linux]
        outputs:
            IS_PUSH_TO_MASTER: ${{ steps.check-event.outputs.IS_PUSH_TO_MASTER }}
            IS_PUSH_TO_TAG: ${{ steps.check-event.outputs.IS_PUSH_TO_TAG }}
            HAS_NON_UI_CHANGES: ${{ steps.check-changes.outputs.HAS_NON_UI_CHANGES }}
        steps:
            - name: Determine event type
              id: check-event
              run: |
                  IS_PUSH_TO_MASTER=0
                  if [[ "${{ github.event_name }}" == 'push' && \
                      "${{ github.ref }}" == 'refs/heads/master' ]]; then
                    IS_PUSH_TO_MASTER=1
                  fi
                  echo "IS_PUSH_TO_MASTER=$IS_PUSH_TO_MASTER" >> $GITHUB_OUTPUT
                  IS_PUSH_TO_TAG=0
                  if [[ "${{ github.ref_type }}" == 'tag' ]]; then
                    IS_PUSH_TO_TAG=1
                  fi
                  echo "IS_PUSH_TO_TAG=$IS_PUSH_TO_TAG" >> $GITHUB_OUTPUT
            - name: Check out code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  fetch-depth: 20
            - name: Check for changes outside 'ui/**'
              if: github.event_name == 'pull_request'
              id: check-changes
              run: |
                  set -x
                  git fetch --depth=20 origin ${{ github.event.pull_request.base.sha }}
                  LAST_COMMON_COMMIT_SHA="$(git merge-base HEAD ${{ github.event.pull_request.base.sha }})"
                  FILES_CHANGED=$(git diff --name-only HEAD $LAST_COMMON_COMMIT_SHA)
                  HAS_NON_UI_CHANGES=0
                  for file in $FILES_CHANGED; do
                    if [[ ! $file == ui/* ]]; then
                      HAS_NON_UI_CHANGES=1
                      break
                    fi
                  done
                  echo "HAS_NON_UI_CHANGES=$HAS_NON_UI_CHANGES" >> $GITHUB_OUTPUT

    lint:
        name: 'Lint'
        needs: precheck
        if: >
            needs.precheck.outputs.HAS_NON_UI_CHANGES == '1' ||
            needs.precheck.outputs.IS_PUSH_TO_MASTER == '1'
        runs-on: [self-hosted, linux]
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
            - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
              with:
                  nix_path: nixpkgs=channel:nixos-22.05
            - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
              with:
                  name: fedibtc
                  authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
              continue-on-error: true

            # run the same check that git `pre-commit` hook would, just in case
            - name: Commit check
              run: nix develop --ignore-environment .#lint --command ./misc/git-hooks/pre-commit

    # all the derivations that are based on the whole workspace
    build-workspace:
        strategy:
          matrix:
            host:
              - linux
            include:
              - host: linux
                runs-on: [self-hosted, linux]

        name: "Build workspace on ${{ matrix.host }}"
        runs-on: ${{ matrix.runs-on }}
        timeout-minutes: 30
        needs: precheck
        if: >
            needs.precheck.outputs.HAS_NON_UI_CHANGES == '1' ||
            needs.precheck.outputs.IS_PUSH_TO_MASTER == '1' ||
            needs.precheck.outputs.IS_PUSH_TO_TAG == '1'
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
            - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
              with:
                  nix_path: nixpkgs=channel:nixos-22.05
            - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
              with:
                  name: fedibtc
                  authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

            - name: Clippy
              run: nix build -L .#ci.workspaceClippy

            - name: Tests
              timeout-minutes: 10
              run: nix build -L .#ci.testCiAll

            # Clippy/check fingerprints cannot reuse cargo build artifacts, so
            # this uses a separate source-independent dependency cache.
            - name: Clippy (WASM)
              timeout-minutes: 10
              run: nix build -L .#wasm32-unknown.ci.workspaceWasmClippy

            - name: Build wasm
              timeout-minutes: 10
              run: nix build -L .#wasm32-unknown.ci.fedi-wasm-pack

            - name: Cleanup build folder
              run: |
                pwd
                rm -Rf "$(pwd)"
                mkdir -p "$(pwd)"

    build-linux:
        name: 'Build - linux'
        needs: precheck
        if: >
            needs.precheck.outputs.HAS_NON_UI_CHANGES == '1' ||
            needs.precheck.outputs.IS_PUSH_TO_MASTER == '1' ||
            needs.precheck.outputs.IS_PUSH_TO_TAG == '1'
        runs-on: [ self-hosted, linux ]
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
            - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
              with:
                  nix_path: nixpkgs=channel:nixos-22.05
            - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
              with:
                  name: fedibtc
                  authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

            - name: Build fedi-fedimint-pkgs
              run: nix build -L .#ci.fedi-fedimint-pkgs

            - name: Build fedi-fedimintd
              run: nix build -L .#ci.fedi-fedimintd

            - name: Build fedi-fedimint-cli
              run: nix build -L .#ci.fedi-fedimint-cli

            - name: Build api-types
              run: nix build -L .#ci.api-types

            - name: Build fedi-ffi
              run: nix build -L .#ci.fedi-ffi

            - name: Build fedi-wasm
              run: nix build -L .#wasm32-unknown.ci.fedi-wasm

            - name: Build gateway-pkgs
              run: nix build -L .#gateway-pkgs

            - name: Build gatewayd
              run: nix build -L .#gatewayd

            - name: Build gateway-cli
              run: nix build -L .#gateway-cli

            - name: Build fedimint-dbtool
              run: nix build -L .#fedimint-dbtool

    build-android:
        name: 'Build - android'
        needs: precheck
        if: >
            needs.precheck.outputs.HAS_NON_UI_CHANGES == '1' ||
            needs.precheck.outputs.IS_PUSH_TO_MASTER == '1'
        runs-on: [self-hosted, linux ]
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
            - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
              with:
                  nix_path: nixpkgs=channel:nixos-22.05
            - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
              with:
                  name: fedibtc
                  authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

            - name: Build Android bridge artifacts
              run: nix build -L .#ci.fedi-android-bridge-libs

            - name: Install Android bridge Kotlin artifacts
              run: nix develop -c env FM_BUILD_BRIDGE_ANDROID_LIBS_OUT=./result/share/fedi-android ./scripts/bridge/install-bridge-android.sh

            - name: Build fedi-ffi
              run: nix build -L .#aarch64-android.ci.fedi-ffi

    build-ios:
        name: 'Build - macos'
        needs: precheck
        if: >
            needs.precheck.outputs.HAS_NON_UI_CHANGES == '1' ||
            needs.precheck.outputs.IS_PUSH_TO_MASTER == '1'
        runs-on: [self-hosted, macos, arm64, macstadium]
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
            - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
              with:
                  nix_path: nixpkgs=channel:nixos-22.05
            - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
              with:
                  name: fedibtc
                  authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
              continue-on-error: true

            - name: Build iOS bridge artifacts
              # note: can't use --ignore-environment as it uses globally installed xcode
              run: nix develop -L .#xcode --command env HOME="$HOME" BUILD_ALL_BRIDGE_TARGETS=1 CARGO_PROFILE=ci scripts/ci/run-in-fs-dir-cache.sh build-bridge-ios ./scripts/bridge/build-bridge-ios.sh

    shell:
        strategy:
            matrix:
                host:
                    - linux
                    - macos-arm64
                include:
                    - host: linux
                      runs-on: [self-hosted, linux]
                      build-in-pr: true
                      timeout: 30
                      system: x86_64-linux
                    - host: macos-arm64
                      runs-on: [self-hosted, macos, arm64, macstadium]
                      os: macOS
                      build-in-pr: true
                      timeout: 45
                      system: aarch64-darwin

        name: 'Dev shells - ${{ matrix.host }}'
        runs-on: ${{ matrix.runs-on }}
        timeout-minutes: ${{ matrix.timeout }}

        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              if: github.ref == 'refs/heads/master' || matrix.build-in-pr

            - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
              if: github.ref == 'refs/heads/master' || matrix.build-in-pr
              with:
                  nix_path: nixpkgs=channel:nixos-22.05

            - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
              if: github.ref == 'refs/heads/master' || matrix.build-in-pr
              with:
                  name: fedibtc
                  authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
              continue-on-error: true

            - name: Dev shell
              if: (github.ref == 'refs/heads/master' || matrix.build-in-pr)
              run: nix build -L .#devShells.${{ matrix.system }}.default


    containers:
      name: "Containers (amd64)"
      needs: precheck
      if: >
          needs.precheck.outputs.HAS_NON_UI_CHANGES == '1' ||
          needs.precheck.outputs.IS_PUSH_TO_MASTER == '1' ||
          needs.precheck.outputs.IS_PUSH_TO_TAG == '1'
      # Pinned to x64: this job is the producer of the `-amd64` images.
      runs-on: [self-hosted, linux, x64]
      timeout-minutes: 30
      steps:
        - name: Checkout Code
          uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        - name: Prepare
          uses: ./.github/actions/prepare
        - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
          with:
            nix_path: nixpkgs=channel:nixos-23.11
            extra_nix_config: |
              connect-timeout = 15
              stalled-download-timeout = 15
        - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
          with:
            name: fedibtc
            authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          continue-on-error: true

        - name: Clean up old images
          run: |
            docker image prune -a --filter "until=24h" -f

        - name: Build fedi-fedimintd container
          run: |
            if [ "$GITHUB_EVENT_NAME" == "pull_request" ] || [ "$GITHUB_EVENT_NAME" == "merge_group" ]; then
              nix build -L .#ci.container.fedi-fedimintd
            else
              nix build -L .#container.fedi-fedimintd
            fi
            echo "fedi_fedimintd_container_tag=$(docker load < result | awk '{ print $3 }')" >> $GITHUB_ENV

        - name: Build fedi-fedimint-cli container
          run: |
            if [ "$GITHUB_EVENT_NAME" == "pull_request" ] || [ "$GITHUB_EVENT_NAME" == "merge_group" ]; then
              nix build -L .#ci.container.fedi-fedimint-cli
            else
              nix build -L .#container.fedi-fedimint-cli
            fi
            echo "fedi_fedimint_cli_container_tag=$(docker load < result | awk '{ print $3 }')" >> $GITHUB_ENV


        # This job publishes ONLY the `-amd64` inputs. `containers-manifest` is
        # the sole writer of the canonical (unsuffixed) tags, so those are never
        # momentarily single-platform and an arm64 failure can't leave them so.
        #
        # Every Docker-mutating step requires a real `push` event: a
        # `workflow_dispatch` on a tag also sets `IS_PUSH_TO_TAG`, and without
        # this gate it would republish a release tag while the arm64 leg and the
        # manifest job (both push-only) sat out — downgrading a published
        # multi-arch release to amd64-only.
        - name: Login to Docker Hub
          if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref_type == 'tag')
          uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
          with:
            username: dawidfedi
            password: ${{ secrets.DOCKER_HUB_DAWIDFEDI_ACCESS_TOKEN }}

        - name: Publish amd64 tags
          if: github.event_name == 'push' && github.ref == 'refs/heads/master'
          run: |
            nix_tag=${{ env.fedi_fedimintd_container_tag }} && hub_tag="fedibtc/fedi-fedimintd:${LAST_COMMIT_SHA}-amd64" && docker tag "$nix_tag" "$hub_tag" && docker push "$hub_tag"
            nix_tag=${{ env.fedi_fedimint_cli_container_tag }} && hub_tag="fedibtc/fedi-fedimint-cli:${LAST_COMMIT_SHA}-amd64" && docker tag "$nix_tag" "$hub_tag" && docker push "$hub_tag"
            nix_tag=${{ env.fedi_fedimintd_container_tag }} && hub_tag="fedibtc/fedi-fedimintd:master-amd64" && docker tag "$nix_tag" "$hub_tag" && docker push "$hub_tag"
            nix_tag=${{ env.fedi_fedimint_cli_container_tag }} && hub_tag="fedibtc/fedi-fedimint-cli:master-amd64" && docker tag "$nix_tag" "$hub_tag" && docker push "$hub_tag"

        - name: Publish amd64 tags (tagged release)
          if: github.event_name == 'push' && github.ref_type == 'tag'
          run: |
            nix_tag=${{ env.fedi_fedimintd_container_tag }} && hub_tag="fedibtc/fedi-fedimintd:${GITHUB_REF_NAME}-amd64" && docker tag "$nix_tag" "$hub_tag" && docker push "$hub_tag"
            nix_tag=${{ env.fedi_fedimint_cli_container_tag }} && hub_tag="fedibtc/fedi-fedimint-cli:${GITHUB_REF_NAME}-amd64" && docker tag "$nix_tag" "$hub_tag" && docker push "$hub_tag"

    # arm64 (Graviton) leg of the container build.
    #
    # Runs on a GitHub-hosted arm64 larger runner rather than a self-hosted box:
    # the container job burns ~1.2k runner-minutes/month, a ~3% duty cycle, so
    # pay-per-minute is cheaper than owning a machine (see PR description).
    #
    # Scoped to master/tag pushes plus manual dispatch on purpose: only those
    # publish images, and it keeps this to ~34 builds/month instead of ~216.
    #
    # This job must never enter the dev shell: `android-nixpkgs` has no
    # `aarch64-linux` attribute, so `nix develop` / `nix flake check` die on arm.
    # Building the container derivations directly is unaffected.
    containers-arm64:
      name: "Containers (arm64)"
      needs: precheck
      if: >
          needs.precheck.outputs.IS_PUSH_TO_MASTER == '1' ||
          needs.precheck.outputs.IS_PUSH_TO_TAG == '1' ||
          github.event_name == 'workflow_dispatch'
      runs-on: linux-arm64-8core
      # arm64 cachix starts empty, so the first builds compile the native tree
      # (rocksdb, jemalloc, aws-lc) from source. Lower this toward the x86 job's
      # 30 once the cache is warm and we have measured a steady-state build.
      timeout-minutes: 180
      steps:
        - name: Checkout Code
          uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        - name: Prepare
          uses: ./.github/actions/prepare
        - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
          with:
            nix_path: nixpkgs=channel:nixos-23.11
            extra_nix_config: |
              connect-timeout = 15
              stalled-download-timeout = 15
        - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
          with:
            name: fedibtc
            authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          continue-on-error: true

        - name: Build fedi-fedimintd container
          run: |
            nix build -L .#container.fedi-fedimintd
            echo "fedi_fedimintd_container_tag=$(docker load < result | awk '{ print $3 }')" >> $GITHUB_ENV

        - name: Build fedi-fedimint-cli container
          run: |
            nix build -L .#container.fedi-fedimint-cli
            echo "fedi_fedimint_cli_container_tag=$(docker load < result | awk '{ print $3 }')" >> $GITHUB_ENV

        - name: Login to Docker Hub
          if: github.event_name == 'push'
          uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
          with:
            username: dawidfedi
            password: ${{ secrets.DOCKER_HUB_DAWIDFEDI_ACCESS_TOKEN }}

        # workflow_dispatch builds nothing to publish — it exists so the arm64
        # leg can be exercised (and timed) without touching Docker Hub.
        - name: Publish arm64 tags
          if: github.event_name == 'push' && github.ref == 'refs/heads/master'
          run: |
            nix_tag=${{ env.fedi_fedimintd_container_tag }} && hub_tag="fedibtc/fedi-fedimintd:${LAST_COMMIT_SHA}-arm64" && docker tag "$nix_tag" "$hub_tag" && docker push "$hub_tag"
            nix_tag=${{ env.fedi_fedimint_cli_container_tag }} && hub_tag="fedibtc/fedi-fedimint-cli:${LAST_COMMIT_SHA}-arm64" && docker tag "$nix_tag" "$hub_tag" && docker push "$hub_tag"
            nix_tag=${{ env.fedi_fedimintd_container_tag }} && hub_tag="fedibtc/fedi-fedimintd:master-arm64" && docker tag "$nix_tag" "$hub_tag" && docker push "$hub_tag"
            nix_tag=${{ env.fedi_fedimint_cli_container_tag }} && hub_tag="fedibtc/fedi-fedimint-cli:master-arm64" && docker tag "$nix_tag" "$hub_tag" && docker push "$hub_tag"

        - name: Publish arm64 tags (tagged release)
          if: github.event_name == 'push' && github.ref_type == 'tag'
          run: |
            nix_tag=${{ env.fedi_fedimintd_container_tag }} && hub_tag="fedibtc/fedi-fedimintd:${GITHUB_REF_NAME}-arm64" && docker tag "$nix_tag" "$hub_tag" && docker push "$hub_tag"
            nix_tag=${{ env.fedi_fedimint_cli_container_tag }} && hub_tag="fedibtc/fedi-fedimint-cli:${GITHUB_REF_NAME}-arm64" && docker tag "$nix_tag" "$hub_tag" && docker push "$hub_tag"

    # Joins the per-arch tags into multi-arch manifest lists, so that
    # `fedibtc/fedi-fedimintd:master` resolves to amd64 or arm64 by platform.
    #
    # Sole writer of the canonical (unsuffixed) tags, so they are never
    # single-platform. If either arch leg fails, this job is skipped and no
    # canonical tag is written: the new `<sha>`/release tag is simply absent,
    # and `master` keeps pointing at the previous (still multi-arch) revision.
    # The run goes red instead of publishing a single-arch canonical tag.
    containers-manifest:
      name: "Containers (multi-arch manifest)"
      needs: [containers, containers-arm64]
      if: >
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/master' || github.ref_type == 'tag')
      runs-on: [self-hosted, linux]
      timeout-minutes: 10
      env:
        DOCKER_CLI_EXPERIMENTAL: enabled
      steps:
        - name: Login to Docker Hub
          uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
          with:
            username: dawidfedi
            password: ${{ secrets.DOCKER_HUB_DAWIDFEDI_ACCESS_TOKEN }}

        - name: Create and push manifest lists
          run: |
            set -euo pipefail
            # The NixOS github-runner service exposes only bash, coreutils,
            # git, tar, gzip, nix, gawk, docker, cachix, gnupg and curl on
            # PATH — no `jq`, and no `grep` either — so take `jq` from a pinned
            # nixpkgs (the rev `flake.lock` used when this was written; any
            # nixpkgs would do). Called once up front, before anything is
            # published, so an unusable verifier fails the job early.
            jq() {
              nix --extra-experimental-features 'nix-command flakes' \
                run 'github:NixOS/nixpkgs/569d578509928497eddc3fdbf94a799027050be4#jq' -- "$@"
            }
            jq --version

            if [ "${{ github.ref_type }}" == 'tag' ]; then
              tags=("${GITHUB_REF_NAME}")
            else
              tags=("${GITHUB_SHA}" "master")
            fi
            for image in fedi-fedimintd fedi-fedimint-cli; do
              for tag in "${tags[@]}"; do
                list="fedibtc/${image}:${tag}"
                # Clears stale local scratch state in ~/.docker/manifests on this
                # persistent self-hosted runner, so `create --amend` can't splice
                # in entries from an earlier run. `docker manifest rm` deletes
                # from local storage only — it never touches the registry.
                docker manifest rm "$list" || true
                docker manifest create "$list" --amend "${list}-amd64" --amend "${list}-arm64"
                docker manifest push "$list"

                # Verify what the registry serves, not the local scratch copy.
                # `docker manifest inspect` returns the local list when one
                # exists (cli/command/manifest/inspect.go tries the local store
                # first, registry second), so the copy `create` just wrote has
                # to go. Deliberately not `|| true`: a failed removal would turn
                # the check below into a self-test of local state.
                docker manifest rm "$list"
                served="$(docker manifest inspect "$list")"
                # Exact set equality on the (os, architecture) tuples, parsed
                # structurally rather than grepped out of the JSON text.
                platforms="$(printf '%s' "$served" |
                  jq -r '[.manifests[].platform | "\(.os)/\(.architecture)"] | sort | join(" ")')"
                if [ "$platforms" != "linux/amd64 linux/arm64" ]; then
                  echo "ERROR: $list must serve exactly 'linux/amd64 linux/arm64', got '$platforms'"
                  printf '%s\n' "$served"
                  exit 1
                fi
                echo "OK: $list serves $platforms"
              done
            done

    check-nixos-up-to-date:
      name: "Check NixOS/nixpkgs on ${{ matrix.arch }}"
      strategy:
        matrix:
          arch: [x64, macos]
          include:
            - arch: x64
              runs-on: [self-hosted, linux, x64]
            - arch: macos
              runs-on: [self-hosted, macos, macstadium]
      runs-on: ${{ matrix.runs-on }}
      if: github.event_name == 'pull_request'
      timeout-minutes: 5
      steps:
        - name: Check NixOS system age
          run: |
            if [ ! -f /etc/nixpkgs-last-modified ]; then
              echo "ERROR: /etc/nixpkgs-last-modified file not found"
              exit 1
            fi

            MAX_AGE_DAYS=45

            last_modified=$(cat /etc/nixpkgs-last-modified)
            current_time=$(date +%s)
            age_seconds=$((current_time - last_modified))
            age_days=$((age_seconds / 86400))

            echo "System last modified: $(date -d @$last_modified '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Current time: $(date -d @$current_time '+%Y-%m-%d %H:%M:%S UTC')"
            echo "System age: $age_days days"

            if [ $age_days -gt $MAX_AGE_DAYS ]; then
              echo "ERROR: NixOS system is $age_days days old (older than $MAX_AGE_DAYS days)."
              echo "DO NOT PANIC!!! I repeat: Do not panic!"
              echo "This is NOT a required CI check and only a reminder to keep github workers up to date."
              echo "Please ping dpc to stop being lazy and update CI workers."
              echo "THANK YOU FOR YOUR ATTENTION TO THIS MATTER!"
              exit 1
            else
              echo "SUCCESS: NixOS system is $age_days days old (within $MAX_AGE_DAYS day limit)"
            fi

    status:
      name: Status
      needs: [lint, build-workspace, build-linux, build-android, build-ios, shell]
      if: ${{ always() }}
      runs-on: [self-hosted, linux ]
      steps:
        - name: Check status of all jobs
          if: >-
            ${{
              contains(needs.*.result, 'failure') ||
              contains(needs.*.result, 'cancelled')
            }}
          run: exit 1
